<script>
/**
 * x-animated-num — smoothly interpolates a numeric value between renders.
 *   Usage: <span x-animated-num="someExpression"></span>
 *   Modifier `.pct` formats as a signed percentage with no decimals
 *     <span x-animated-num.pct="someExpr"></span>
 *   Expression that evaluates to null/NaN → "—" placeholder, no animation.
 *
 *   Replaces a typical `x-text="fmt_int(value)"` so the displayed number
 *   tweens between selections (e.g. clicking OA A → OA B) instead of
 *   snapping. ~350 ms ease-out cubic.
 */
document.addEventListener('alpine:init', () => {
  Alpine.directive('animated-num', (el, { expression, modifiers }, { evaluateLater, effect }) => {
    const get = evaluateLater(expression);
    const isPct = modifiers.includes('pct');
    const duration = 350;
    const fmt = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      if (isPct) return (n >= 0 ? '+' : '') + Math.round(n) + '%';
      return Math.round(n).toLocaleString('en-GB');
    };
    let current = null, raf = null;
    const animate_to = (target) => {
      if (target === null || target === undefined || isNaN(target)) {
        el.textContent = '—';
        current = null;
        return;
      }
      if (current === null || current === target) {
        current = target;
        el.textContent = fmt(target);
        return;
      }
      const start = current;
      const startTime = performance.now();
      if (raf) cancelAnimationFrame(raf);
      const tick = (now) => {
        const t = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        current = start + (target - start) * eased;
        el.textContent = fmt(current);
        if (t < 1) raf = requestAnimationFrame(tick);
        else { current = target; el.textContent = fmt(target); raf = null; }
      };
      raf = requestAnimationFrame(tick);
    };
    effect(() => { get((value) => animate_to(value)); });
  });
});
</script>
<script>
// Register the pmtiles:// protocol with MapLibre so it can fetch byte-range
// chunks from the .pmtiles archive served as a static asset.
const pmtilesProtocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile);

// Region is loaded from summary.json (region.slug), so the only config
// here is which summary to fetch. Swap by serving a different summary.json
// in the same folder, or rebuild via `export_atlas_data.py <region>`.
const SUMMARY_URL = 'summary.json';

// Bands → hex (MapLibre needs hex values, not CSS vars).
const BAND_HEX = {
  A: '#00845A', B: '#2C9F29', C: '#8CBF26', D: '#FCD800',
  E: '#F0AB00', F: '#ED6F21', G: '#E3242B',
};
// Continuous ramp for per-surface views in Present mode (5 stops, green→red).
const RAMP_HEX = ['#00845A', '#8CBF26', '#FCD800', '#ED6F21', '#E3242B'];

// Diverging palette for scenario-mode delta maps. Perceptually-balanced
// blue→white→red (ColorBrewer RdBu_r). Blue = improvement (lower than
// Present), red = worsening (higher than Present).
const DIVERGING_HEX = ['#2166ac', '#92c5de', '#f7f7f7', '#f4a582', '#b2182b'];

// Sequential ramp for Lock-in view — light → deep red. Higher residual =
// more "stuck", more locked into urban form.
const LOCKIN_HEX = ['#fff5eb', '#fdd0a2', '#fd8d3c', '#d94801', '#7f2704'];
// Delta range shown on the diverging legend, in %.
const DELTA_RANGE_PCT = 50;

// Engineering constants for hypothetical demand-side scenarios.
// Mirror values in stats/atlas/demand.py.
const HEAT_PUMP_COP = 3.0;
const EV_EFFICIENCY_RATIO = 3.5;

// Planning-tool integration: in-browser XGBoost models predict NEPI from
// 9 features. Used to explain a selected OA's rating ("what's driving this")
// and to let users override features and see counterfactual ratings.
const FEATURE_LABELS = {
  people_per_ha: 'Population density',
  pct_detached: '% Detached',
  pct_semi: '% Semi-detached',
  pct_terraced: '% Terraced',
  pct_flat: '% Flat',
  local_coverage: 'Walkable amenity access',
  cc_bus_800_wt: 'Bus access',
  cc_rail_800_wt: 'Rail access',
  median_build_year: 'Median build year',
};
// Dwelling-type spectrum: the four pct_* features are interpolated between
// these named archetypes (provided by nepi_models.json) using a Gaussian
// kernel. Position 0 = mostly detached, 1 = mostly flats.
const TYPE_POS = { Detached: 0, Semi: 0.33, Terraced: 0.67, Flat: 1.0 };

function atlas() {
  return {
    // ---- state ----
    region_label: '',
    summary: null,
    geojson: null,
    map: null,
    selected: null,
    mode: 'present',
    unit: 'kwh',
    surface: 'composite',
    /**
     * Aggregation level: 'oa' (Output Areas) or 'lad' (Local Authority
     * Districts). Set automatically by map zoom — there is no toggle.
     */
    level: 'lad',
    map_zoom: 0,
    LEVEL_ZOOM_THRESHOLD: 11,
    /**
     * Lock-in is now a Surface choice (`surface === 'lockin'`) rather than
     * an independent toggle. Kept as a getter so call sites read cleanly.
     * When active the map paints with a sequential ramp on the OA's
     * residual energy after full grid decarbonisation + 100% HP + 100% EV.
     */
    get lockin_mode() { return this.surface === 'lockin'; },
    // Adoption sliders (0..100). Hypothetical demand-side rollout layered
    // on top of the selected Mode's grid factors.
    hp_slider_pct: 0,
    ev_slider_pct: 0,
    // In-browser XGBoost: loaded once, used to explain the selected OA's
    // rating and to predict counterfactuals when the user overrides features.
    xgb_models: null,
    // Per-feature overrides for the selected OA. null = no override (use
    // the OA's actual value). Object keyed by feature name when active.
    overrides: {},
    // Whether the override section is open
    show_whatif: false,
    surfaces: [
      { key: 'composite', label: 'Composite',
        tooltip: 'A–G band on the sum of all three surfaces — the headline NEPI score.' },
      { key: 'form',      label: 'Form',
        tooltip: 'Building energy only (gas + electricity from DESNZ metered data). Lower for compact dwellings.' },
      { key: 'mobility',  label: 'Mobility',
        tooltip: 'Transport energy from Census 2021 commute distance × mode × fuel intensity. Lower in dense areas.' },
      { key: 'access',    label: 'Access', basket: true,
        tooltip: 'Indicative basket index — extra transport energy attributable to poor walkable service coverage. Derived from typical-trips × typical land uses, not metered energy. Conservative lower bound on the real gap.' },
      { key: 'lockin',    label: 'Lock-in',
        tooltip: 'Structural lock-in: residual energy / CO₂ / £ after full UK grid decarbonisation (2050) + 100% heat-pump + 100% EV adoption. What no technology rolls back — pure urban form.' },
    ],

    // ---- init ----
    async init() {
      const summary = await fetch(SUMMARY_URL).then(r => r.json());
      this.summary = summary;
      this.region_label = summary.region?.label ?? summary.bua ?? '';
      // Load XGBoost models in the background — non-blocking; the map
      // renders first; the planning-tool panel populates as soon as the
      // models arrive.
      fetch('nepi_models.json')
        .then(r => r.json())
        .then(m => { this.xgb_models = m; })
        .catch(e => console.warn('Could not load nepi_models.json:', e));
      this.init_map();
      this.$watch('surface',       () => this.update_fill_paint());
      this.$watch('mode',          () => this.update_fill_paint());
      this.$watch('unit',          () => this.update_fill_paint());
      this.$watch('hp_slider_pct', () => this.update_fill_paint());
      this.$watch('ev_slider_pct', () => this.update_fill_paint());
      this.$watch('level',         () => this.on_level_change());
      this.$watch('selected', () => { this.overrides = {}; this.show_whatif = false; });
    },
    /** Swap visible layer set when Level toggles. */
    on_level_change() {
      if (!this.map) return;
      const visible = (id, on) => this.map.setLayoutProperty(
        id, 'visibility', on ? 'visible' : 'none'
      );
      const oa_on = this.level === 'oa';
      ['oa-fill','oa-line','oa-selected'].forEach(l => {
        if (this.map.getLayer(l)) visible(l, oa_on);
      });
      ['lad-fill','lad-line','lad-selected'].forEach(l => {
        if (this.map.getLayer(l)) visible(l, !oa_on);
      });
      // Selection is level-specific; clear when switching
      this.deselect_oa();
      this.update_fill_paint();
    },
    /** Block of stats relevant to the active level (OA or LAD). */
    get level_data() {
      if (this.level === 'lad' && this.summary?.lad_level) return this.summary.lad_level;
      return this.summary;
    },
    /** Map state badge shows what the map is currently coloured by. */
    get map_state_label() {
      if (this.lockin_mode) return 'Lock-in (residual)';
      if (this.mode !== 'present' || this.adoption_active) return 'Δ vs Present';
      return 'A–G band';
    },
    // ---- adoption helpers ----
    get hp_slider() { return this.hp_slider_pct / 100; },
    get ev_slider() { return this.ev_slider_pct / 100; },
    get adoption_active() {
      return this.hp_slider_pct > 0 || this.ev_slider_pct > 0;
    },
    set_adoption(hp_pct, ev_pct) {
      this.hp_slider_pct = hp_pct;
      this.ev_slider_pct = ev_pct;
    },
    /**
     * Progressive disclosure for the scenario controls (Year + Adoption).
     * Hidden by default — Surface + Unit are enough for the headline view.
     * Auto-revealed when any scenario value is non-default OR the user
     * explicitly opts in. Suppressed entirely when Surface = Lock-in,
     * which fixes its own scenario (2050 + 100% HP + 100% EV) so there's
     * nothing to project.
     */
    show_scenarios: false,
    get scenarios_active() {
      return this.mode !== 'present' || this.adoption_active;
    },
    /**
     * Whether the projection trigger button is shown at all.
     * - Lock-in surface: scenario is fixed by definition.
     * - kWh unit: projecting forward doesn't change the headline value
     *   (kWh isn't grid-projected; only kgCO₂ / £ unit factors evolve).
     *   Adoption sliders technically still alter kWh, but Year — the
     *   primary lever — is inert, so the disclosure is misleading here.
     */
    get scenarios_available() {
      return this.surface !== 'lockin' && this.unit !== 'kwh';
    },
    /** Whether the popover panel itself is open. */
    get scenarios_visible() {
      if (!this.scenarios_available) return false;
      return this.show_scenarios || this.scenarios_active;
    },
    toggle_scenarios() {
      this.show_scenarios = !this.show_scenarios;
    },
    reset_scenarios() {
      this.mode = 'present';
      this.hp_slider_pct = 0;
      this.ev_slider_pct = 0;
      this.show_scenarios = false;
    },
    /**
     * A year-mode button is "inert" — clicking it changes nothing visible —
     * when the active unit is kWh. kWh is not projected forward; year only
     * affects the unit-conversion factors (CO₂ per kWh, £ per kWh), so a
     * year change with kWh selected leaves every value identical.
     */
    is_year_inert(key) {
      return this.unit === 'kwh' && key !== 'present';
    },

    init_map() {
      const slug = this.summary.region?.slug ?? this.summary.bua;
      const tiles = this.summary.tiles ?? {};
      // Each level has its own pmtiles archive — LAD with full fidelity,
      // OA with size-controlled drop strategy. Backward-compat: if a single
      // `url` is present (old format), use it for both layers.
      const lad_url = tiles.lad?.url ?? tiles.url ?? `${slug}_lad.pmtiles`;
      const oa_url  = tiles.oa?.url  ?? tiles.url ?? `${slug}_oa.pmtiles`;
      const absUrl = (u) => new URL(u, window.location.href).toString();

      // Attribution per OGL v3.0 — Crown copyright on government data;
      // OS database right on boundary/road geometries; ODbL on OSM tiles.
      const ATTR_OS = 'Contains OS data © Crown copyright and database right 2024';
      const ATTR_ONS = 'Contains ONS data © Crown copyright and database right 2024';
      const ATTR_NEPI = 'NEPI © UCL · OGL v3.0';

      const sources = {
        osm: {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        },
        lad_src: {
          type: 'vector',
          url: `pmtiles://${absUrl(lad_url)}`,
          attribution: `${ATTR_NEPI} · ${ATTR_OS} · LAD aggregation`,
        },
        oa_src: {
          type: 'vector',
          url: `pmtiles://${absUrl(oa_url)}`,
          attribution: `${ATTR_NEPI} · ${ATTR_ONS} · ${ATTR_OS}`,
        },
      };

      this.map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources,
          layers: [{ id: 'osm', type: 'raster', source: 'osm' }],
        },
        bounds: this.summary.bounds,
        fitBoundsOptions: { padding: 30 },
      });

      // Track zoom; auto-switch level at the threshold so the visible
      // layer matches the available data at that zoom.
      this.map.on('zoom', () => {
        this.map_zoom = this.map.getZoom();
        const want = this.map_zoom >= this.LEVEL_ZOOM_THRESHOLD ? 'oa' : 'lad';
        if (want !== this.level) this.level = want;
      });

      this.map.on('load', () => {
        this.map_zoom = this.map.getZoom();
        const want = this.map_zoom >= this.LEVEL_ZOOM_THRESHOLD ? 'oa' : 'lad';
        if (want !== this.level) this.level = want;
        // OA layer — pmtiles min-zoom 11; nothing renders below.
        this.map.addLayer({
          id: 'oa-fill', type: 'fill', source: 'oa_src',
          'source-layer': 'oa',
          paint: { 'fill-color': this.fill_expression(), 'fill-opacity': 0.65 },
          layout: { visibility: this.level === 'oa' ? 'visible' : 'none' },
        });
        this.map.addLayer({
          id: 'oa-line', type: 'line', source: 'oa_src',
          'source-layer': 'oa',
          paint: { 'line-color': '#444', 'line-width': 0.3 },
          layout: { visibility: this.level === 'oa' ? 'visible' : 'none' },
        });
        this.map.addLayer({
          id: 'oa-selected', type: 'line', source: 'oa_src',
          'source-layer': 'oa',
          paint: { 'line-color': '#000', 'line-width': 2.5 },
          filter: ['==', 'OA21CD', ''],
          layout: { visibility: this.level === 'oa' ? 'visible' : 'none' },
        });

        // LAD layer — full fidelity, all zooms 4-14.
        this.map.addLayer({
          id: 'lad-fill', type: 'fill', source: 'lad_src',
          'source-layer': 'lad',
          paint: { 'fill-color': this.fill_expression(), 'fill-opacity': 0.65 },
          layout: { visibility: this.level === 'lad' ? 'visible' : 'none' },
        });
        this.map.addLayer({
          id: 'lad-line', type: 'line', source: 'lad_src',
          'source-layer': 'lad',
          paint: { 'line-color': '#666', 'line-width': 0.6 },
          layout: { visibility: this.level === 'lad' ? 'visible' : 'none' },
        });
        this.map.addLayer({
          id: 'lad-selected', type: 'line', source: 'lad_src',
          'source-layer': 'lad',
          paint: { 'line-color': '#000', 'line-width': 3 },
          filter: ['==', 'LAD22CD', ''],
          layout: { visibility: this.level === 'lad' ? 'visible' : 'none' },
        });

        this.map.on('click', 'oa-fill', (e) => {
          const feat = e.features[0];
          this.selected = feat.properties;
          this.map.setFilter('oa-selected', ['==', 'OA21CD', feat.properties.OA21CD]);
        });
        this.map.on('click', 'lad-fill', (e) => {
          const feat = e.features[0];
          this.selected = feat.properties;
          this.map.setFilter('lad-selected', ['==', 'LAD22CD', feat.properties.LAD22CD]);
        });
        const cur_pointer = (on) => () => this.map.getCanvas().style.cursor = on ? 'pointer' : '';
        ['oa-fill', 'lad-fill'].forEach(l => {
          this.map.on('mouseenter', l, cur_pointer(true));
          this.map.on('mouseleave', l, cur_pointer(false));
        });
      });
    },

    update_fill_paint() {
      if (!this.map) return;
      const expr = this.fill_expression();
      ['oa-fill', 'lad-fill'].forEach(l => {
        if (this.map.getLayer(l)) this.map.setPaintProperty(l, 'fill-color', expr);
      });
    },

    /**
     * Per-view delta range in % — symmetric envelope around 0, set so that
     * ~90% of OAs fall inside the vivid colour band of the diverging palette.
     * Combines the year-only precomputed range with envelope ranges scaled
     * by the live adoption sliders.
     */
    delta_range_for_view() {
      const dist = this.level_data?.delta_distributions ?? this.summary?.delta_distributions ?? {};
      const u = this.unit;
      const s = this.surface;
      // Year-only range (0% sliders): from precomputed mode.unit.surface
      const year_key = `${this.mode}.${u}.${s}`;
      const year_range = dist[year_key]?.range_pct ?? 0;
      // Envelope ranges at 100% adoption — scaled linearly by current sliders
      const hp = this.hp_slider, ev = this.ev_slider;
      let scen_range = 0;
      if (hp > 0 && ev > 0) {
        const env = dist[`_envelope_both.${u}.${s}`]?.range_pct ?? 80;
        scen_range = env * Math.max(hp, ev);
      } else if (hp > 0) {
        const env = dist[`_envelope_hp.${u}.${s}`]?.range_pct ?? 60;
        scen_range = env * hp;
      } else if (ev > 0) {
        const env = dist[`_envelope_ev.${u}.${s}`]?.range_pct ?? 60;
        scen_range = env * ev;
      }
      const r = Math.max(5, year_range, scen_range);
      // Round up to a nice number for the legend label
      if (r <= 10) return Math.ceil(r);
      if (r <= 50) return Math.ceil(r / 5) * 5;
      return Math.ceil(r / 10) * 10;
    },
    /**
     * Helper: get factors + demand for a given scenario key.
     */
    scenario_spec(scenario_key) {
      const s = this.summary?.scenarios?.[scenario_key];
      if (!s) return null;
      return {
        factors: s.units?.[this.unit]?.factors ?? null,
        demand: s.demand ?? { hp_share: 0, ev_share: 0 },
      };
    },
    /**
     * Build a MapLibre expression for per-OA total in a given scenario.
     * Mirrors compute_oa_total / _per_oa_total_in_view exactly.
     */
    build_total_expression_for(factors, demand) {
      const hp = demand?.hp_share ?? 0;
      const ev = demand?.ev_share ?? 0;
      const get_n = (k) => ['coalesce', ['to-number', ['get', k]], 0];
      const elec = get_n('oa_elec_mean_kwh');
      const gas = get_n('oa_gas_mean_kwh');
      const mob = get_n('nepi_mobility_kwh');
      const acc = get_n('nepi_access_kwh');
      const bev_clipped = ['min', 1, ['max', 0, get_n('bev_share')]];
      const bev_target = ['max', bev_clipped, ev];
      const new_gas = ['*', gas, 1 - hp];
      const new_elec = ['+', elec, ['*', gas, hp / HEAT_PUMP_COP]];
      const ice_share = ['-', 1, bev_target];
      const mob_ice = ['*', mob, ice_share];
      const mob_ev = ['/', ['*', mob, bev_target], EV_EFFICIENCY_RATIO];
      const acc_ice = ['*', acc, ice_share];
      const acc_ev = ['/', ['*', acc, bev_target], EV_EFFICIENCY_RATIO];
      return ['+',
        ['*', new_elec, factors.elec],
        ['*', new_gas, factors.gas],
        ['*', mob_ice, factors.mobility],
        ['*', mob_ev, factors.elec],
        ['*', acc_ice, factors.access],
        ['*', acc_ev, factors.elec],
      ];
    },
    build_form_expression_for(factors, demand) {
      const hp = demand?.hp_share ?? 0;
      const get_n = (k) => ['coalesce', ['to-number', ['get', k]], 0];
      const elec = get_n('oa_elec_mean_kwh');
      const gas = get_n('oa_gas_mean_kwh');
      const new_gas = ['*', gas, 1 - hp];
      const new_elec = ['+', elec, ['*', gas, hp / HEAT_PUMP_COP]];
      return ['+',
        ['*', new_elec, factors.elec],
        ['*', new_gas, factors.gas],
      ];
    },
    build_mobility_expression_for(factors, demand) {
      const ev = demand?.ev_share ?? 0;
      const get_n = (k) => ['coalesce', ['to-number', ['get', k]], 0];
      const mob = get_n('nepi_mobility_kwh');
      const bev_clipped = ['min', 1, ['max', 0, get_n('bev_share')]];
      const bev_target = ['max', bev_clipped, ev];
      return ['+',
        ['*', ['*', mob, ['-', 1, bev_target]], factors.mobility],
        ['*', ['/', ['*', mob, bev_target], EV_EFFICIENCY_RATIO], factors.elec],
      ];
    },
    build_access_expression_for(factors, demand) {
      const ev = demand?.ev_share ?? 0;
      const get_n = (k) => ['coalesce', ['to-number', ['get', k]], 0];
      const acc = get_n('nepi_access_kwh');
      const bev_clipped = ['min', 1, ['max', 0, get_n('bev_share')]];
      const bev_target = ['max', bev_clipped, ev];
      return ['+',
        ['*', ['*', acc, ['-', 1, bev_target]], factors.access],
        ['*', ['/', ['*', acc, bev_target], EV_EFFICIENCY_RATIO], factors.elec],
      ];
    },
    /**
     * Surface-aware expression builder. Uses the surface-specific helper
     * when applicable; falls back to total for composite.
     */
    build_surface_expression_for(surface, factors, demand) {
      if (surface === 'composite') return this.build_total_expression_for(factors, demand);
      if (surface === 'form')      return this.build_form_expression_for(factors, demand);
      if (surface === 'mobility')  return this.build_mobility_expression_for(factors, demand);
      if (surface === 'access')    return this.build_access_expression_for(factors, demand);
      return null;
    },
    /**
     * Percentage-delta expression: 100 × (scenario − present) / present.
     * Used in scenario mode to colour the map by change vs Present.
     */
    build_delta_pct_expression(surface) {
      const cur = this.scenario_spec(this.mode);
      const base = this.scenario_spec('present');
      if (!cur || !base) return null;
      const cur_expr = this.build_surface_expression_for(surface, cur.factors, cur.demand);
      const base_expr = this.build_surface_expression_for(surface, base.factors, base.demand);
      // Guard against div-by-zero with max(present, 1) — for OAs with
      // ~zero present-day Access this clips the delta percentage.
      return ['*', 100, ['/', ['-', cur_expr, base_expr], ['max', base_expr, 1]]];
    },
    // Backward-compat shims for the old call sites
    build_total_expression(factors) {
      return this.build_total_expression_for(factors, this.current_demand);
    },
    build_form_expression(factors) {
      return this.build_form_expression_for(factors, this.current_demand);
    },
    build_mobility_expression(factors) {
      return this.build_mobility_expression_for(factors, this.current_demand);
    },
    fill_expression() {
      const f = this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors;
      if (!f) return band_colour_expression();

      // Lock-in mode: sequential ramp on absolute residual value. Pale =
      // low lock-in (place is structurally efficient); deep red = high
      // lock-in (large residual energy that no technology rolls back).
      // Lockin residuals are typically 35–55% of today's values, so we
      // anchor the stops at scaled-down percentiles. STOPS MUST BE
      // STRICTLY ASCENDING — MapLibre rejects the expression otherwise
      // (causing the layer to render in default grey, hence "goes grey").
      if (this.lockin_mode) {
        const f_2050 = this.summary?.scenarios?.y2050?.units?.[this.unit]?.factors;
        const expr = this.build_total_expression_for(f_2050 || f, { hp_share: 1, ev_share: 1 });
        const breaks = this.summary?.surface_percentiles?.composite;
        if (!breaks) return band_colour_expression();
        const k = this.factor('composite');
        const s0 = breaks.p05 * k * 0.40;
        const s1 = breaks.p25 * k * 0.45;
        const s2 = breaks.p50 * k * 0.50;
        const s3 = breaks.p75 * k * 0.55;
        const s4 = breaks.p95 * k * 0.60;
        return [
          'interpolate', ['linear'], expr,
          s0, LOCKIN_HEX[0],
          s1, LOCKIN_HEX[1],
          s2, LOCKIN_HEX[2],
          s3, LOCKIN_HEX[3],
          s4, LOCKIN_HEX[4],
        ];
      }

      // Diverging delta map whenever a scenario is active — either Mode is
      // not Present, or the adoption sliders are non-zero.
      if (this.mode !== 'present' || this.adoption_active) {
        const delta_expr = this.build_delta_pct_expression(this.surface);
        if (delta_expr === null) return band_colour_expression();
        const r = this.delta_range_for_view();
        return [
          'interpolate', ['linear'], delta_expr,
          -r,         DIVERGING_HEX[0],
          -r / 2,     DIVERGING_HEX[1],
           0,         DIVERGING_HEX[2],
           r / 2,     DIVERGING_HEX[3],
           r,         DIVERGING_HEX[4],
        ];
      }

      // Present mode: absolute A–G band colouring (composite) or ramp (per-surface)
      if (this.surface === 'composite') {
        const view_key = `${this.mode}.${this.unit}`;
        const thresholds = (this.level_data?.band_thresholds_by_view ?? {})[view_key]
                        ?? this.summary?.band_thresholds_by_view?.[view_key];
        if (!thresholds) return band_colour_expression();
        return [
          'step', this.build_total_expression(f),
          BAND_HEX.A,
          thresholds.A.hi, BAND_HEX.B,
          thresholds.B.hi, BAND_HEX.C,
          thresholds.C.hi, BAND_HEX.D,
          thresholds.D.hi, BAND_HEX.E,
          thresholds.E.hi, BAND_HEX.F,
          thresholds.F.hi, BAND_HEX.G,
        ];
      }
      // Per-surface continuous ramp (Present mode only)
      let surface_expr;
      if (this.surface === 'form') {
        surface_expr = this.build_form_expression(f);
      } else if (this.surface === 'mobility') {
        surface_expr = this.build_mobility_expression(f);
      } else {
        const col = `nepi_${this.surface}_kwh`;
        surface_expr = ['*', ['coalesce', ['to-number', ['get', col]], 0],
                       f[this.surface]];
      }
      const breaks = this.level_data?.surface_percentiles?.[this.surface]
                  ?? this.summary?.surface_percentiles?.[this.surface];
      if (!breaks) return band_colour_expression();
      const k = this.factor(this.surface);
      return [
        'interpolate', ['linear'], surface_expr,
        breaks.p05 * k, RAMP_HEX[0],
        breaks.p25 * k, RAMP_HEX[1],
        breaks.p50 * k, RAMP_HEX[2],
        breaks.p75 * k, RAMP_HEX[3],
        breaks.p95 * k, RAMP_HEX[4],
      ];
    },

    // ---- unit / scenario factors ----
    factor(surface) {
      // Multiplier for `surface` under the currently selected mode + unit.
      const f = this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors;
      return f?.[surface] ?? 1.0;
    },
    get current_demand() {
      // Reads from the live adoption sliders. The Mode toggle controls grid
      // factors; demand-side rollout lives on the sliders independently.
      return { hp_share: this.hp_slider, ev_share: this.ev_slider };
    },
    /**
     * Compute total kWh/CO2/£ for an OA under a given scenario/unit.
     * Mirrors stats/atlas/summary.py:_per_oa_total_in_view exactly so the
     * map paint expression, the OA detail panel, and server-side band
     * thresholds all agree to the kWh.
     */
    compute_oa_total(oa, factors, demand) {
      const elec = oa.oa_elec_mean_kwh ?? 0;
      const gas = oa.oa_gas_mean_kwh ?? 0;
      const mob = oa.nepi_mobility_kwh ?? 0;
      const acc = oa.nepi_access_kwh ?? 0;
      const bev = Math.max(0, Math.min(1, oa.bev_share ?? 0));
      const hp = demand?.hp_share ?? 0;
      const ev = demand?.ev_share ?? 0;
      // Heat-pump rollout: hp of gas → elec at 1/COP
      const new_gas = gas * (1 - hp);
      const new_elec = elec + gas * hp / HEAT_PUMP_COP;
      // EV rollout: target absolute BEV share, override actual where higher
      const bev_target = Math.max(bev, ev);
      const mob_ice = mob * (1 - bev_target);
      const mob_ev = mob * bev_target / EV_EFFICIENCY_RATIO;
      const acc_ice = acc * (1 - bev_target);
      const acc_ev = acc * bev_target / EV_EFFICIENCY_RATIO;
      return new_elec * factors.elec
           + new_gas * factors.gas
           + mob_ice * factors.mobility
           + mob_ev * factors.elec
           + acc_ice * factors.access
           + acc_ev * factors.elec;
    },
    /**
     * Single source of truth for per-OA values.
     * Computes the value for a given surface under a given (factors, demand).
     * Mirrors stats/atlas/summary.py:_per_oa_surface — same math, server and
     * client must agree to the kWh.
     */
    compute_oa_surface(oa, surface, factors, demand) {
      if (!oa || !factors) return 0;
      const elec = oa.oa_elec_mean_kwh ?? 0;
      const gas = oa.oa_gas_mean_kwh ?? 0;
      const mob = oa.nepi_mobility_kwh ?? 0;
      const acc = oa.nepi_access_kwh ?? 0;
      const bev = Math.max(0, Math.min(1, oa.bev_share ?? 0));
      const hp = demand?.hp_share ?? 0;
      const ev = demand?.ev_share ?? 0;
      const new_gas = gas * (1 - hp);
      const new_elec = elec + gas * hp / HEAT_PUMP_COP;
      const bev_target = Math.max(bev, ev);
      const form_val = new_elec * factors.elec + new_gas * factors.gas;
      const mob_val = mob * (1 - bev_target) * factors.mobility
                    + mob * bev_target / EV_EFFICIENCY_RATIO * factors.elec;
      const acc_val = acc * (1 - bev_target) * factors.access
                    + acc * bev_target / EV_EFFICIENCY_RATIO * factors.elec;
      if (surface === 'composite') return form_val + mob_val + acc_val;
      if (surface === 'form') return form_val;
      if (surface === 'mobility') return mob_val;
      if (surface === 'access') return acc_val;
      return 0;
    },
    /**
     * Compute a counterfactual (what-if) per-surface value using the XGBoost
     * model predictions on the user-overridden features. Form + Mobility
     * come from the trained models; Access is kept at the OA's actual value
     * (no model). National-blend factors are applied for unit conversion
     * because the model predicts kWh totals, not gas/elec splits.
     */
    predicted_oa_surface(surface, factors, demand) {
      if (!this.xgb_models || !this.selected) {
        return this.compute_oa_surface(this.selected, surface, factors, demand);
      }
      const features = this.effective_features;
      const predicted_form_kwh = this.predict_model('form', features) || 0;
      const predicted_mob_kwh = this.predict_model('mobility', features) || 0;
      const actual_acc_kwh = this.selected.nepi_access_kwh ?? 0;
      const hp = demand?.hp_share ?? 0;
      const ev = demand?.ev_share ?? 0;
      // Form: model gives total kWh — apply HP rollout proportionally and
      // convert with the blended Form factor (national 70/30 gas/elec).
      // We don't have per-fuel split for the predicted value.
      const form_kwh_after_hp = predicted_form_kwh * (1 - hp)
                              + predicted_form_kwh * hp / HEAT_PUMP_COP;
      const form_val = form_kwh_after_hp * factors.form;
      // Mobility: apply EV rollout. Predicted kWh assumes ICE; EV portion
      // gets the elec factor (and 1/EV_EFF efficiency).
      const mob_ice_kwh = predicted_mob_kwh * (1 - ev);
      const mob_ev_kwh = predicted_mob_kwh * ev / EV_EFFICIENCY_RATIO;
      const mob_val = mob_ice_kwh * factors.mobility + mob_ev_kwh * factors.elec;
      // Access: use actual OA Access since no model exists. Apply EV rollout
      // identically (Access penalty rides Mobility's fuel mix).
      const acc_ice_kwh = actual_acc_kwh * (1 - ev);
      const acc_ev_kwh = actual_acc_kwh * ev / EV_EFFICIENCY_RATIO;
      const acc_val = acc_ice_kwh * factors.access + acc_ev_kwh * factors.elec;
      if (surface === 'composite') return form_val + mob_val + acc_val;
      if (surface === 'form') return form_val;
      if (surface === 'mobility') return mob_val;
      if (surface === 'access') return acc_val;
      return 0;
    },
    /**
     * Surface value in the current view — actual OA data projected through
     * the current scenario. This is what the headline shows AND what the map
     * is coloured by. Stays consistent across all view changes.
     */
    current_value(surface) {
      // Lock-in is a derived surface: residual after full grid + 100% HP + EV.
      // Independent of the active Year / Adoption controls.
      if (surface === 'lockin') return this.lockin_value('composite');
      const f = this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors;
      if (!f || !this.selected) return 0;
      return this.compute_oa_surface(this.selected, surface, f, this.current_demand);
    },
    /** Present-view value (mode=present, sliders=0) for a surface. */
    present_value(surface) {
      // For lock-in there is no "present" — the value IS the residual under
      // the 2050+full-tech projection. Return the same number so vs-Present
      // deltas resolve to 0 and the headline stays sensible.
      if (surface === 'lockin') return this.lockin_value('composite');
      const f = this.summary?.scenarios?.present?.units?.[this.unit]?.factors;
      const neutral = { hp_share: 0, ev_share: 0 };
      if (!f || !this.selected) return 0;
      return this.compute_oa_surface(this.selected, surface, f, neutral);
    },
    /** % change between current view and Present view for a surface (matches map). */
    delta_pct(surface) {
      const cur = this.current_value(surface);
      const base = this.present_value(surface);
      if (base <= 0) return null;
      return 100 * (cur - base) / base;
    },
    /** Counterfactual value: what the OA's rating would be with overridden features. */
    whatif_value(surface) {
      const f = this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors;
      if (!f || !this.selected) return 0;
      return this.predicted_oa_surface(surface, f, this.current_demand);
    },
    /** Counterfactual value at Present (mode=present, sliders=0). */
    whatif_present_value(surface) {
      const f = this.summary?.scenarios?.present?.units?.[this.unit]?.factors;
      if (!f || !this.selected) return 0;
      return this.predicted_oa_surface(surface, f, { hp_share: 0, ev_share: 0 });
    },

    // ====================================================================
    // Lock-in: the energy / CO2 / £ that can't be addressed by technology.
    // = the residual after full electrification (2050 grid + 100% HP + 100% EV).
    // What's left is determined by urban form alone — generational lock-in.
    // ====================================================================

    /** OA value under maximum technology adoption (2050 grid + 100% HP + 100% EV). */
    lockin_value(surface) {
      const f = this.summary?.scenarios?.y2050?.units?.[this.unit]?.factors
             ?? this.summary?.scenarios?.present?.units?.[this.unit]?.factors;
      if (!f || !this.selected) return 0;
      return this.compute_oa_surface(this.selected, surface, f, { hp_share: 1, ev_share: 1 });
    },
    /** "Today" value = the OA's actual data in current unit, present mode, no adoption. */
    today_value(surface) {
      const f = this.summary?.scenarios?.present?.units?.[this.unit]?.factors;
      if (!f || !this.selected) return 0;
      return this.compute_oa_surface(this.selected, surface, f, { hp_share: 0, ev_share: 0 });
    },
    /** % of today's value that remains after max electrification = "lock-in fraction". */
    lockin_fraction(surface) {
      const today = this.today_value(surface);
      if (!today || today <= 0) return null;
      return 100 * this.lockin_value(surface) / today;
    },
    /** Addressable amount = today − residual. Positive means tech can save this much. */
    addressable_value(surface) {
      return Math.max(0, this.today_value(surface) - this.lockin_value(surface));
    },
    /**
     * Absolute reference for the lock-in bars: national p95 of today's
     * composite, scaled to the current unit. Both bars share this reference
     * so absolute values are visually comparable across OAs.
     */
    lockin_reference(surface) {
      const breaks = this.summary?.surface_percentiles?.[surface];
      if (!breaks?.p95) return null;
      return breaks.p95 * this.factor(surface);
    },
    /** % of the absolute reference occupied by the locked-in amount. */
    lockin_pct_of_ref(surface) {
      const ref = this.lockin_reference(surface);
      if (!ref || ref <= 0) return null;
      return Math.min(100, 100 * this.lockin_value(surface) / ref);
    },
    /** % of the absolute reference occupied by the addressable amount. */
    addressable_pct_of_ref(surface) {
      const ref = this.lockin_reference(surface);
      if (!ref || ref <= 0) return null;
      return Math.min(100, 100 * this.addressable_value(surface) / ref);
    },
    /** Per-OA pre-computed lock-in totals for all surfaces — used by the map. */
    get lockin_composite_kwh() {
      const f = this.summary?.scenarios?.y2050?.units?.kwh?.factors
             ?? this.summary?.scenarios?.present?.units?.kwh?.factors;
      if (!f || !this.selected) return null;
      return this.compute_oa_surface(this.selected, 'composite', f, { hp_share: 1, ev_share: 1 });
    },
    /** % change vs Present for the counterfactual (mirrors delta_pct for what-if). */
    whatif_delta_pct(surface) {
      const cur = this.whatif_value(surface);
      const base = this.whatif_present_value(surface);
      if (base <= 0) return null;
      return 100 * (cur - base) / base;
    },
    /** % change from actual to what-if at current scenario (the override's impact). */
    whatif_delta_for(surface) {
      const cur = this.current_value(surface);
      const wif = this.whatif_value(surface);
      if (cur <= 0) return null;
      return 100 * (wif - cur) / cur;
    },
    /**
     * Band lookup for a composite value, using the present-day national
     * thresholds. Used to show an A–G chip for the what-if counterfactual.
     */
    band_for_value(composite_kwh) {
      const thresholds = this.summary?.band_thresholds;
      if (!thresholds || composite_kwh == null) return '?';
      for (const b of 'ABCDEFG') {
        if (composite_kwh <= thresholds[b].hi_kwh) return b;
      }
      return 'G';
    },
    /**
     * What-if composite kWh — used for band lookup. Always in kWh
     * regardless of selected unit, because banding is defined on kWh.
     */
    get whatif_composite_kwh() {
      const f_kwh = this.summary?.scenarios?.[this.mode]?.units?.kwh?.factors;
      if (!f_kwh || !this.selected) return null;
      return this.predicted_oa_surface('composite', f_kwh, this.current_demand);
    },
    get whatif_band() {
      return this.band_for_value(this.whatif_composite_kwh);
    },
    /** True when the panel should show delta indicators (matches map mode). */
    get is_scenario_view() {
      return this.mode !== 'present' || this.adoption_active;
    },
    // Legacy aliases used in templates (kept for backward compat)
    convert_oa_total(oa) { return this.compute_oa_surface(oa, 'composite',
      this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors,
      this.current_demand); },
    convert_oa_form(oa) { return this.compute_oa_surface(oa, 'form',
      this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors,
      this.current_demand); },
    convert_oa_mobility(oa) { return this.compute_oa_surface(oa, 'mobility',
      this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors,
      this.current_demand); },
    convert_oa_access(oa) { return this.compute_oa_surface(oa, 'access',
      this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.factors,
      this.current_demand); },
    /**
     * Pick a colour from the diverging palette for a given delta %.
     * Uses the same 5 stops as the MapLibre paint expression at -r, -r/2,
     * 0, +r/2, +r — so the badge in the panel matches the OA's hue on the map.
     */
    delta_colour(delta_pct, range_pct) {
      if (delta_pct == null) return '#cccccc';
      const r = range_pct || 30;
      if (delta_pct <= -r * 0.75) return DIVERGING_HEX[0];   // strong blue
      if (delta_pct <= -r * 0.25) return DIVERGING_HEX[1];   // light blue
      if (delta_pct <   r * 0.25) return DIVERGING_HEX[2];   // neutral
      if (delta_pct <   r * 0.75) return DIVERGING_HEX[3];   // light red
      return DIVERGING_HEX[4];                                // strong red
    },
    get unit_short() {
      return this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.short
        ?? this.summary?.units?.[this.unit]?.short ?? 'kWh';
    },
    get unit_label() {
      return this.summary?.scenarios?.[this.mode]?.units?.[this.unit]?.label
        ?? this.summary?.units?.[this.unit]?.label ?? 'kWh / household / year';
    },

    // ---- legend ----
    get legend_mode() {
      if (this.mode !== 'present' || this.adoption_active) return 'diverging';
      return this.surface === 'composite' ? 'bands' : 'ramp';
    },
    get diverging_gradient_css() {
      return `linear-gradient(to right, ${DIVERGING_HEX.join(', ')})`;
    },
    get delta_range_pct() { return this.delta_range_for_view(); },
    get ramp_stops() {
      const breaks = this.summary?.surface_percentiles?.[this.surface];
      if (!breaks) return [];
      // Surface-specific factor scales the legend axis to the current unit
      const k = this.factor(this.surface);
      return [
        { kwh: breaks.p05 * k, hex: RAMP_HEX[0] },
        { kwh: breaks.p25 * k, hex: RAMP_HEX[1] },
        { kwh: breaks.p50 * k, hex: RAMP_HEX[2] },
        { kwh: breaks.p75 * k, hex: RAMP_HEX[3] },
        { kwh: breaks.p95 * k, hex: RAMP_HEX[4] },
      ];
    },
    get ramp_gradient_css() {
      return `linear-gradient(to right, ${RAMP_HEX.join(', ')})`;
    },
    get surface_label() {
      return this.surfaces.find(s => s.key === this.surface)?.label ?? this.surface;
    },

    // ---- right-panel derived state ----
    get oa_total() {
      // Selected OA's composite value, in current unit + scenario mode
      return this.selected ? this.convert_oa_total(this.selected) : 0;
    },
    get surface_rows() {
      if (!this.selected) return [];
      const breaks = this.summary?.surface_percentiles ?? {};
      const k_for = (s) => this.factor(s);
      const rows = [
        { key: 'form',     label: 'Form',
          value: this.convert_oa_form(this.selected) },
        { key: 'mobility', label: 'Mobility',
          value: this.convert_oa_mobility(this.selected) },
        { key: 'access',   label: 'Access',
          value: this.convert_oa_access(this.selected) },
      ];
      return rows.map(r => {
        const b = breaks[r.key];
        const k = k_for(r.key);
        let pos = null, p25_pos = null, p75_pos = null, median_pos = null;
        let median_val = null;
        if (b) {
          const lo = b.p05 * k;
          const hi = b.p95 * k;
          const span = hi - lo || 1;
          const clamp01 = (x) => Math.max(0, Math.min(100, x));
          pos        = clamp01(100 * ((r.value ?? 0) - lo) / span);
          p25_pos    = clamp01(100 * (b.p25 * k - lo) / span);
          p75_pos    = clamp01(100 * (b.p75 * k - lo) / span);
          median_pos = clamp01(100 * (b.p50 * k - lo) / span);
          median_val = b.p50 * k;
        }
        let vs_med_pct = null;
        if (median_val && median_val > 0) {
          vs_med_pct = 100 * ((r.value ?? 0) - median_val) / median_val;
        }
        return { ...r, pos, p25_pos, p75_pos, median_pos, median_val, vs_med_pct };
      });
    },
    /** lowercase archetype slug for CSS class binding */
    get archetype_slug() {
      const t = this.selected?.dominant_type;
      return t ? `arch-${t.toLowerCase()}` : '';
    },
    /** Which band (A–G) contains the national median? Always D for our
     * percentile banding (D spans 36–60%) but compute from data so it
     * stays honest if banding rules change. */
    get median_band() {
      const t = this.summary?.band_thresholds;
      const med = this.summary?.national?.median_kwh;
      if (!t || med == null) return 'D';
      for (const b of 'ABCDEFG') {
        if (med <= t[b].hi_kwh) return b;
      }
      return 'G';
    },
    get vs_national() {
      const pct = this.vs_national_pct;
      return pct === null ? { text: '—', cls: 'todo' } : delta_label(pct);
    },
    get vs_national_pct() {
      if (!this.selected || !this.summary) return null;
      const ref = this.is_lad_selection
        ? (this.summary.lad_level?.distribution?.median_kwh ?? this.summary.national.median_kwh)
        : this.summary.national.median_kwh;
      const me = this.selected.nepi_total_kwh;
      if (!ref || ref === 0) return null;
      return 100 * (me - ref) / ref;
    },
    get vs_peers() {
      const pct = this.vs_peers_pct;
      return pct === null ? { text: '—', cls: 'todo' } : delta_label(pct);
    },
    get vs_peers_pct() {
      if (!this.selected || !this.summary) return null;
      const t = this.selected.dominant_type;
      const arch = this.summary.archetype_medians?.[t];
      if (!arch) return null;
      const me = this.selected.nepi_total_kwh;
      if (!arch.total_kwh) return null;
      return 100 * (me - arch.total_kwh) / arch.total_kwh;
    },
    get vs_present() {
      const pct = this.vs_present_pct;
      return pct === null ? null : delta_label(pct);
    },
    get vs_present_pct() {
      if (!this.selected || this.mode === 'present') return null;
      const f = this.summary?.scenarios?.present?.units?.[this.unit]?.factors;
      if (!f) return null;
      const oa = this.selected;
      const present = (oa.oa_elec_mean_kwh ?? 0) * f.elec
                    + (oa.oa_gas_mean_kwh ?? 0) * f.gas
                    + (oa.nepi_mobility_kwh ?? 0) * f.mobility
                    + (oa.nepi_access_kwh ?? 0) * f.access;
      const future = this.oa_total;
      if (!present || present === 0) return null;
      return 100 * (future - present) / present;
    },

    // ---- bottom strip ----
    strip_pct(band) {
      if (!this.summary) return 0;
      const counts = this.summary.national.band_counts;
      const max = Math.max(...Object.values(counts));
      return 100 * (counts[band] || 0) / max;
    },

    // ---- selection ----
    deselect_oa() {
      this.selected = null;
      this.overrides = {};
      this.show_whatif = false;
      if (this.map?.getLayer('oa-selected')) {
        this.map.setFilter('oa-selected', ['==', 'OA21CD', '']);
      }
      if (this.map?.getLayer('lad-selected')) {
        this.map.setFilter('lad-selected', ['==', 'LAD22CD', '']);
      }
    },
    /** True when the selected feature is a LAD (not an OA). */
    get is_lad_selection() {
      return !!this.selected?.LAD22CD && !this.selected?.OA21CD;
    },
    get selection_id() {
      return this.selected?.OA21CD ?? this.selected?.LAD22NM ?? '—';
    },

    // ====================================================================
    // Planning-tool integration: in-browser XGBoost
    // ====================================================================

    /** Evaluate a single tree on a feature vector. */
    predict_tree(nodes, features) {
      let idx = 0;
      while (true) {
        const node = nodes[idx];
        if (node.leaf !== undefined) return node.leaf;
        const val = features[node.f] ?? 0;
        idx = val < node.t ? node.y : node.n;
      }
    },
    /** Run a model (sum of trees + base score) on a feature vector. */
    predict_model(model_name, features) {
      const m = this.xgb_models?.models?.[model_name];
      if (!m) return null;
      let total = m.base_score;
      for (const tree of m.trees) total += this.predict_tree(tree, features);
      return total;
    },
    /** Gaussian-blended interpolation across the four dwelling archetypes. */
    interpolate_archetype(position) {
      const archetypes = this.xgb_models?.archetypes;
      if (!archetypes) return {};
      const weights = {}; let total_w = 0;
      for (const [dtype, pos] of Object.entries(TYPE_POS)) {
        const w = Math.exp(-0.5 * ((position - pos) / 0.2) ** 2);
        weights[dtype] = w;
        total_w += w;
      }
      const all_features = ['people_per_ha','pct_detached','pct_semi','pct_terraced','pct_flat',
        'local_coverage','cc_bus_800_wt','cc_rail_800_wt','median_build_year'];
      const out = {};
      for (const feat of all_features) {
        let val = 0;
        for (const [dtype, w] of Object.entries(weights)) {
          val += (w / total_w) * (archetypes[dtype]?.[feat] ?? 0);
        }
        out[feat] = val;
      }
      // Renormalise dwelling-type percentages to sum to 100
      const pct_cols = ['pct_detached','pct_semi','pct_terraced','pct_flat'];
      const pct_sum = pct_cols.reduce((s, c) => s + (out[c] || 0), 0);
      if (pct_sum > 0) pct_cols.forEach(c => out[c] = (out[c] / pct_sum) * 100);
      return out;
    },
    /** Mid-archetype reference vector — used as the baseline for marginal contributions. */
    get reference_features() {
      return this.interpolate_archetype(0.5);
    },
    /** All 9 features for the selected OA (raw, unmodified). */
    get oa_features() {
      if (!this.selected) return null;
      const o = this.selected;
      return {
        people_per_ha: o.people_per_ha ?? 0,
        pct_detached: o.pct_detached ?? 0,
        pct_semi: o.pct_semi ?? 0,
        pct_terraced: o.pct_terraced ?? 0,
        pct_flat: o.pct_flat ?? 0,
        local_coverage: o.local_coverage ?? 0,
        cc_bus_800_wt: o.cc_bus_800_wt ?? 0,
        cc_rail_800_wt: o.cc_rail_800_wt ?? 0,
        median_build_year: o.median_build_year ?? 0,
      };
    },
    /** OA features with any user overrides applied. */
    get effective_features() {
      const base = this.oa_features;
      if (!base) return null;
      return { ...base, ...this.overrides };
    },
    /** Predicted Form + Mobility kWh for a feature vector. */
    predict_total_kwh(features) {
      const f = this.predict_model('form', features);
      const m = this.predict_model('mobility', features);
      if (f === null || m === null) return null;
      return f + m;
    },
    get oa_predicted() {
      if (!this.xgb_models || !this.selected) return null;
      return this.predict_total_kwh(this.oa_features);
    },
    get whatif_predicted() {
      if (!this.xgb_models || !this.selected) return null;
      return this.predict_total_kwh(this.effective_features);
    },
    get whatif_delta_pct() {
      const a = this.oa_predicted;
      const b = this.whatif_predicted;
      if (a === null || b === null || a === 0) return null;
      return 100 * (b - a) / a;
    },
    /**
     * Marginal contribution per feature: how much each feature shifts the
     * combined Form+Mobility prediction from the mid-archetype reference.
     * Sorted by absolute magnitude.
     */
    get oa_contributions() {
      if (!this.xgb_models || !this.selected) return [];
      const ref = this.reference_features;
      const cur = this.effective_features;
      const ref_total = this.predict_total_kwh(ref);
      const feature_keys = Object.keys(FEATURE_LABELS);
      const rows = feature_keys.map(f => {
        const modified = { ...ref, [f]: cur[f] };
        const mod_total = this.predict_total_kwh(modified);
        return {
          feature: f,
          label: FEATURE_LABELS[f],
          value: cur[f],
          contribution: mod_total - ref_total,
        };
      });
      return rows.sort((a, b) => Math.abs(b.contribution) - Math.abs(a.contribution));
    },
    /** Slider config for the override panel. Spectrum slider for dwelling type. */
    get whatif_sliders() {
      const r = this.summary?.feature_ranges ?? {};
      return [
        { key: 'people_per_ha', label: 'Density (people/ha)',
          min: 0, max: Math.ceil(r.people_per_ha?.p95 ?? 200), step: 1, decimals: 0 },
        { key: 'median_build_year', label: 'Median build year',
          min: 1860, max: 2024, step: 5, decimals: 0 },
        { key: 'local_coverage', label: 'Walkable access',
          min: 0, max: 1, step: 0.05, decimals: 2 },
        { key: 'cc_bus_800_wt', label: 'Bus access',
          min: 0, max: Math.ceil((r.cc_bus_800_wt?.p95 ?? 5) * 10) / 10, step: 0.1, decimals: 1 },
        { key: 'cc_rail_800_wt', label: 'Rail access',
          min: 0, max: Math.ceil((r.cc_rail_800_wt?.p95 ?? 0.5) * 10) / 10, step: 0.05, decimals: 2 },
      ];
    },
    /** Current value of a slider (override if set, else OA actual). */
    slider_value(key) {
      return this.overrides[key] ?? this.oa_features?.[key] ?? 0;
    },
    set_override(key, value) {
      this.overrides = { ...this.overrides, [key]: Number(value) };
    },
    /** Current dwelling-type spectrum position derived from pct_* shares. */
    get dwelling_pos() {
      const f = this.effective_features;
      if (!f) return 0.5;
      const total = (f.pct_detached || 0) + (f.pct_semi || 0)
                  + (f.pct_terraced || 0) + (f.pct_flat || 0);
      if (total <= 0) return 0.5;
      return (f.pct_detached * TYPE_POS.Detached
            + f.pct_semi * TYPE_POS.Semi
            + f.pct_terraced * TYPE_POS.Terraced
            + f.pct_flat * TYPE_POS.Flat) / total;
    },
    set_dwelling_pos(pos) {
      const a = this.interpolate_archetype(Number(pos));
      this.overrides = { ...this.overrides,
        pct_detached: a.pct_detached,
        pct_semi: a.pct_semi,
        pct_terraced: a.pct_terraced,
        pct_flat: a.pct_flat,
      };
    },
    reset_whatif() {
      this.overrides = {};
    },
    has_overrides() {
      return Object.keys(this.overrides).length > 0;
    },

    // ---- formatters ----
    fmt_int(n) {
      if (n == null || isNaN(n)) return '—';
      return Math.round(n).toLocaleString('en-GB');
    },
    /** Convert sanitised BUA name (e.g. "manchester", "ashton_under_lyne")
     * to a display-friendly form ("Manchester", "Ashton-under-Lyne"). */
    format_place(name) {
      if (!name) return '';
      return name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    },
    /** Style a contribution bar — width and offset based on signed value. */
    contrib_style(value) {
      const max = Math.max(...this.oa_contributions.map(c => Math.abs(c.contribution)), 1);
      const pct = Math.abs(value) / max * 50;  // 50% = full bar from centre
      const offset = value >= 0 ? 'left: 50%' : `left: ${50 - pct}%`;
      return `${offset}; width: ${pct}%`;
    },
  };
}

function band_colour_expression() {
  return [
    'match', ['get', 'nepi_band'],
    'A', BAND_HEX.A, 'B', BAND_HEX.B, 'C', BAND_HEX.C, 'D', BAND_HEX.D,
    'E', BAND_HEX.E, 'F', BAND_HEX.F, 'G', BAND_HEX.G,
    '#cccccc',
  ];
}
function delta_label(pct) {
  const sign = pct > 0 ? '+' : '';
  const cls = pct < -1 ? 'better' : pct > 1 ? 'worse' : 'todo';
  return { text: `${sign}${pct.toFixed(0)}%`, cls };
}
</script>
